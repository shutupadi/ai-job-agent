services:
  db:
    image: postgres:16-alpine
    container_name: jobagent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobagent}
      POSTGRES_DB: ${POSTGRES_DB:-jobagent}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: jobagent-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jobagent}:${POSTGRES_PASSWORD:-jobagent}@db:5432/${POSTGRES_DB:-jobagent}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - resume_storage:/app/storage
    command: >
      bash -lc "
        alembic upgrade head &&
        python -m app.bootstrap &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  scheduler:
    build:
      context: ./backend
    container_name: jobagent-scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jobagent}:${POSTGRES_PASSWORD:-jobagent}@db:5432/${POSTGRES_DB:-jobagent}
      PYTHONUNBUFFERED: "1"
      ROLE: scheduler
    volumes:
      - ./backend:/app
      - resume_storage:/app/storage
    command: python -m app.scheduler.jobs daemon

  frontend:
    build:
      context: ./frontend
    container_name: jobagent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  dbdata:
  resume_storage:
