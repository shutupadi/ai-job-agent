# Render Blueprint — deploys the FastAPI backend + a free Postgres.
# The frontend deploys separately on Vercel (see frontend/vercel.json + DEPLOY.md).
#
# Notes for the FREE tier:
#   • Free web services SLEEP after ~15 min idle (first request is slow), and
#     free Postgres EXPIRES after ~90 days — fine for a resume demo.
#   • Render background workers are NOT free, so the twice-daily pipeline is
#     triggered by the GitHub Actions cron (.github/workflows/ci.yml →
#     remote-trigger) hitting POST /api/runs/trigger, instead of running the
#     scheduler container.
#   • Set the secret env vars (AICREDITS_API_KEY, GROQ_API_KEY, CANDIDATE_*) in
#     the Render dashboard — they are marked `sync: false` so they are NOT
#     committed here.
services:
  - type: web
    name: ai-job-agent-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-job-agent-db
          property: connectionString   # app normalises postgres:// → postgresql+psycopg://
      - key: APP_ENV
        value: prod
      - key: TZ
        value: Asia/Kolkata
      - key: APPLY_MODE
        value: approval
      - key: LLM_PROVIDER
        value: aicredits
      - key: LLM_FALLBACK_PROVIDER
        value: groq
      - key: AICREDITS_BASE_URL
        value: https://api.aicredits.in/v1
      - key: AICREDITS_MODEL
        value: anthropic/claude-3-haiku
      - key: AICREDITS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CANDIDATE_FULL_NAME
        sync: false
      - key: CANDIDATE_EMAIL
        sync: false
      - key: CANDIDATE_PHONE
        sync: false
      # ── Search + sources (non-secret). DELIBERATELY LIGHT for Render's free
      #    512MB instance: few boards/tenants, low caps, few ranks — so a run
      #    finishes fast + small and doesn't get OOM-killed. (Your local .env
      #    keeps the full heavy config.) Clean public APIs only; LinkedIn/Naukri
      #    scraping stays OFF on the server.
      - key: KEYWORDS
        value: "Software Engineer,Backend,SDE,AI Engineer"
      - key: LOCATIONS
        value: "Bangalore,Hyderabad,Remote,India"
      - key: INCLUDE_REMOTE
        value: "true"
      - key: INCLUDE_INTERNATIONAL
        value: "true"
      - key: MIN_SALARY_LPA
        value: "18"
      - key: GREENHOUSE_BOARDS
        value: "stripe,databricks,figma"
      - key: LEVER_COMPANIES
        value: "ramp,scaleai"
      - key: YC_QUERY
        value: "software engineer"
      - key: ENABLE_WORKDAY
        value: "true"
      - key: ENABLE_ORACLE
        value: "true"
      - key: WORKDAY_TENANTS
        value: "ms.wd5.myworkdayjobs.com|ms|External|Morgan Stanley"
      - key: ORACLE_TENANTS
        value: "jpmc.fa.oraclecloud.com|CX_1001|JPMorgan Chase"
      # Free-tier resource caps (keep the run small + quick):
      - key: WORKDAY_MAX_PER_TENANT
        value: "8"
      - key: ORACLE_MAX_PER_TENANT
        value: "8"
      - key: MAX_RANKS_PER_RUN
        value: "8"
      - key: LLM_CALL_DELAY_SECONDS
        value: "2"

databases:
  - name: ai-job-agent-db
    plan: free
