# Render Blueprint — deploys the FastAPI backend + a free Postgres.
# The frontend deploys separately on Vercel (see frontend/vercel.json + DEPLOY.md).
#
# Notes for the FREE tier:
#   • Free web services SLEEP after ~15 min idle (first request is slow), and
#     free Postgres EXPIRES after ~90 days — fine for a resume demo.
#   • Render background workers are NOT free, so the twice-daily pipeline is
#     triggered by the GitHub Actions cron (.github/workflows/ci.yml →
#     remote-trigger) hitting POST /api/runs/trigger, instead of running the
#     scheduler container.
#   • Set the secret env vars (AICREDITS_API_KEY, GROQ_API_KEY, CANDIDATE_*) in
#     the Render dashboard — they are marked `sync: false` so they are NOT
#     committed here.
services:
  - type: web
    name: ai-job-agent-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-job-agent-db
          property: connectionString   # app normalises postgres:// → postgresql+psycopg://
      - key: APP_ENV
        value: prod
      - key: TZ
        value: Asia/Kolkata
      - key: APPLY_MODE
        value: approval
      - key: LLM_PROVIDER
        value: aicredits
      - key: LLM_FALLBACK_PROVIDER
        value: groq
      - key: AICREDITS_BASE_URL
        value: https://api.aicredits.in/v1
      - key: AICREDITS_MODEL
        value: anthropic/claude-3-haiku
      - key: AICREDITS_API_KEY
        sync: false
      # ── Auth (multi-user) ──
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong random secret
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: GOOGLE_CLIENT_ID
        sync: false                  # set in dashboard to enable Google sign-in
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false                  # your Vercel URL
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CANDIDATE_FULL_NAME
        sync: false
      - key: CANDIDATE_EMAIL
        sync: false
      - key: CANDIDATE_PHONE
        sync: false
      # ── Search + sources (non-secret). DELIBERATELY LIGHT for Render's free
      #    512MB instance: few boards/tenants, low caps, few ranks — so a run
      #    finishes fast + small and doesn't get OOM-killed. (Your local .env
      #    keeps the full heavy config.) Clean public APIs only; LinkedIn/Naukri
      #    scraping stays OFF on the server.
      - key: KEYWORDS
        value: "Software Engineer,Backend,SDE,AI Engineer"
      - key: LOCATIONS
        value: "Bangalore,Hyderabad,Remote,India"
      - key: INCLUDE_REMOTE
        value: "true"
      - key: INCLUDE_INTERNATIONAL
        value: "true"
      - key: MIN_SALARY_LPA
        value: "18"
      # Open to ALL experience levels — per-user matching handles fit.
      - key: EXPERIENCE_FILTER_ENABLED
        value: "false"
      # Auto-cleanup old jobs nobody acted on.
      - key: JOB_RETENTION_DAYS
        value: "30"
      # More sources = more relevant candidates (top product cos + a bank).
      - key: GREENHOUSE_BOARDS
        value: "stripe,databricks,airbnb,coinbase,robinhood,datadog"
      - key: LEVER_COMPANIES
        value: "ramp,scaleai,brex"
      - key: YC_QUERY
        value: "software engineer"
      - key: ENABLE_WORKDAY
        value: "true"
      - key: ENABLE_ORACLE
        value: "true"
      # Best-effort LinkedIn (public guest listings; may be rate-limited from a
      # datacenter IP — Adzuna API is the reliable high-volume upgrade).
      - key: ENABLE_LINKEDIN
        value: "true"
      - key: LINKEDIN_MAX
        value: "15"
      # Adzuna jobs API — high-volume, keyword-searched, covers top firms
      # (Goldman, Bloomberg, big tech). Set the two keys in the dashboard
      # (free at developer.adzuna.com); until then it skips gracefully.
      - key: ENABLE_ADZUNA
        value: "true"
      - key: ADZUNA_COUNTRY
        value: "in"
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: WORKDAY_TENANTS
        value: "ms.wd5.myworkdayjobs.com|ms|External|Morgan Stanley,nvidia.wd5.myworkdayjobs.com|nvidia|NVIDIAExternalCareerSite|NVIDIA"
      - key: ORACLE_TENANTS
        value: "jpmc.fa.oraclecloud.com|CX_1001|JPMorgan Chase"
      # Resource caps (keep each fetch bounded for the free 512MB instance):
      - key: WORKDAY_MAX_PER_TENANT
        value: "8"
      - key: ORACLE_MAX_PER_TENANT
        value: "8"
      # Per-user shortlist size + pacing (paid gateway → faster).
      - key: MAX_RANKS_PER_USER
        value: "30"
      - key: LLM_CALL_DELAY_SECONDS
        value: "1"

databases:
  - name: ai-job-agent-db
    plan: free
